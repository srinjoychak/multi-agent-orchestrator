version: '3.8'

# Multi-Agent Orchestrator — Docker Compose
#
# Used only to build worker images. The orchestrator itself runs as a local
# node process (node src/mcp-server/index.js), not in a container.
#
# Usage:
#   docker compose -f docker/docker-compose.yml build worker-gemini worker-claude

services:

  worker-gemini:
    build:
      context: ..
      dockerfile: docker/workers/Dockerfile.gemini
    image: worker-gemini:latest

  worker-claude:
    build:
      context: ..
      dockerfile: docker/workers/Dockerfile.claude
    image: worker-claude:latest
